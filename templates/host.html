<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizBlast — Host Paneli</title>
<style>
:root {
  --bg: #08080f;
  --s1: #111120;
  --s2: #191930;
  --border: #2a2a45;
  --accent: #f7c948;
  --red: #ff4f6d;
  --blue: #4fc3f7;
  --green: #4cdf80;
  --text: #f0f0fa;
  --muted: #6b6b9a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ── HEADER ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; background:var(--s1); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100;
}
.logo { font-size:1.6rem; font-weight:900; letter-spacing:2px; }
.logo span { color:var(--red); }
.header-stats { display:flex; gap:24px; }
.hstat { text-align:center; }
.hstat .v { font-size:1.4rem; font-weight:700; color:var(--accent); }
.hstat .l { font-size:.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }

/* ── LAYOUT ── */
.main { display:grid; grid-template-columns:1fr 340px; gap:0; height:calc(100vh - 65px); }
.left-panel { padding:24px; overflow-y:auto; }
.right-panel { background:var(--s1); border-left:1px solid var(--border); padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }

/* ── CARDS ── */
.card {
  background:var(--s2); border:1px solid var(--border); border-radius:14px;
  padding:20px; margin-bottom:16px;
}
.card-title {
  font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.card-title::before { content:''; display:block; width:3px; height:14px; background:var(--accent); border-radius:2px; }

/* ── SETUP SCREEN ── */
#setup-screen { display:block; }
#game-screen { display:none; }

.big-center { text-align:center; padding:20px 0; }
.room-code-display {
  font-size:4rem; font-weight:900; letter-spacing:12px;
  color:var(--accent); text-shadow:0 0 40px rgba(247,201,72,.3);
  margin:8px 0;
}
.join-url { font-size:.85rem; color:var(--muted); margin-bottom:16px; word-break:break-all; }
.join-url a { color:var(--blue); }

#qr-container { display:flex; justify-content:center; margin:12px 0; }
#qr-container svg { border-radius:8px; border:4px solid white; }

/* ── BUTTONS ── */
.btn {
  display:inline-flex; align-items:center; gap:8px;
  font-family:inherit; font-weight:700; font-size:.9rem;
  padding:11px 24px; border:none; border-radius:8px;
  cursor:pointer; transition:all .2s; letter-spacing:.5px;
  text-transform:uppercase;
}
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:hover { background:#ffd84d; transform:translateY(-2px); box-shadow:0 6px 20px rgba(247,201,72,.3); }
.btn-danger { background:var(--red); color:#fff; }
.btn-danger:hover { background:#ff7088; transform:translateY(-2px); }
.btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--muted); background:var(--s2); }
.btn-green { background:var(--green); color:#000; }
.btn-green:hover { background:#6aeea0; transform:translateY(-2px); }
.btn:disabled { opacity:.4; cursor:default; transform:none !important; }

.btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }

/* ── FORM ── */
.form-row { margin-bottom:14px; }
.form-row label { display:block; font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.form-row input, .form-row select, .form-row textarea {
  width:100%; background:var(--bg); border:1px solid var(--border);
  border-radius:6px; color:var(--text); padding:10px 14px;
  font-family:inherit; font-size:.9rem; outline:none; transition:border-color .2s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color:var(--accent); }

/* ── QUESTION DISPLAY ── */
.question-box {
  background:var(--s2); border:1px solid var(--border);
  border-radius:14px; padding:24px; margin-bottom:16px;
  position:relative; overflow:hidden;
}
.question-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--accent), var(--red), var(--blue));
}
.q-cat { display:inline-block; background:rgba(79,195,247,.12); color:var(--blue); font-size:.65rem; letter-spacing:2px; padding:3px 10px; border-radius:20px; border:1px solid rgba(79,195,247,.25); margin-bottom:10px; text-transform:uppercase; }
.q-text { font-size:1.3rem; font-weight:600; line-height:1.5; }
.q-counter { font-size:.75rem; color:var(--muted); margin-bottom:8px; }

/* ── OPTIONS GRID ── */
.opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.opt-item {
  background:var(--s1); border:1.5px solid var(--border);
  border-radius:10px; padding:12px 14px;
  display:flex; align-items:center; gap:10px;
  transition:all .3s; font-size:.9rem;
}
.opt-item.correct { border-color:var(--green); background:rgba(76,223,128,.08); }
.opt-item.answered { border-color:var(--accent); background:rgba(247,201,72,.06); }
.opt-letter {
  font-weight:900; font-size:1rem; min-width:28px; height:28px;
  display:flex; align-items:center; justify-content:center;
  border-radius:50%; border:2px solid currentColor;
}

/* ── TIMER ── */
.timer-wrap { margin-bottom:14px; }
.timer-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.timer-val { font-size:1.8rem; font-weight:900; color:var(--accent); transition:color .3s; }
.timer-val.urgent { color:var(--red); animation:pulse .5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
.timer-bar-bg { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.timer-bar { height:100%; background:var(--accent); border-radius:4px; transition:width 1s linear, background .3s; }
.timer-bar.urgent { background:var(--red); }

/* ── PLAYERS LIST ── */
.player-item {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 10px; border-radius:8px; margin-bottom:6px;
  background:var(--bg); border:1px solid var(--border);
  transition:all .3s; animation:fadeIn .3s ease;
}
.player-item .pname { font-weight:600; font-size:.9rem; }
.player-item .pscore { color:var(--accent); font-weight:700; }
.player-item .prank { font-size:.8rem; color:var(--muted); min-width:24px; }
@keyframes fadeIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:none} }

.answer-dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--green); margin-left:6px;
  animation:appear .2s ease;
}
@keyframes appear { from{transform:scale(0)} to{transform:scale(1)} }

/* ── LEADERBOARD ── */
.lb-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:10px; margin-bottom:8px;
  background:var(--bg); border:1px solid var(--border);
}
.lb-rank { font-size:1.1rem; font-weight:900; min-width:32px; }
.lb-rank.gold { color:#ffd700; }
.lb-rank.silver { color:#c0c0c0; }
.lb-rank.bronze { color:#cd7f32; }
.lb-name { flex:1; font-weight:600; }
.lb-score { color:var(--accent); font-weight:700; font-size:1.1rem; }
.lb-streak { font-size:.75rem; color:var(--red); }

/* ── ANSWER BAR CHART ── */
.ans-bars { margin-top:12px; }
.ans-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.ans-bar-letter { font-weight:700; min-width:22px; }
.ans-bar-wrap { flex:1; height:24px; background:var(--border); border-radius:4px; overflow:hidden; position:relative; }
.ans-bar-fill { height:100%; border-radius:4px; transition:width .8s ease; }
.ans-bar-pct { font-size:.8rem; min-width:36px; text-align:right; color:var(--muted); }
.ans-bar-cnt { font-size:.75rem; color:var(--muted); min-width:28px; }

/* ── STATUS BADGE ── */
.status-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 12px; border-radius:20px; font-size:.7rem;
  text-transform:uppercase; letter-spacing:1px; font-weight:700;
}
.status-badge.waiting { background:rgba(107,107,154,.2); color:var(--muted); border:1px solid var(--border); }
.status-badge.playing { background:rgba(76,223,128,.15); color:var(--green); border:1px solid rgba(76,223,128,.3); }
.status-badge.answer { background:rgba(247,201,72,.15); color:var(--accent); border:1px solid rgba(247,201,72,.3); }
.dot { width:8px; height:8px; border-radius:50%; background:currentColor; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── TOAST ── */
#toast {
  position:fixed; bottom:24px; right:24px;
  background:var(--s2); border:1px solid var(--border); border-radius:10px;
  padding:12px 20px; font-size:.9rem; z-index:999;
  transform:translateX(120%); transition:transform .3s; max-width:280px;
}
#toast.show { transform:none; }

/* ── WAITING SCREEN ── */
.waiting-screen { text-align:center; padding:40px 20px; }
.pulse-circle {
  width:120px; height:120px; border-radius:50%; margin:0 auto 20px;
  border:3px solid var(--accent); display:flex; align-items:center; justify-content:center;
  font-size:2.5rem; position:relative; animation:pulse-ring 2s infinite;
}
@keyframes pulse-ring {
  0%,100%{box-shadow:0 0 0 0 rgba(247,201,72,.4)}
  50%{box-shadow:0 0 0 20px rgba(247,201,72,.0)}
}

/* ── FINISH SCREEN ── */
#finish-screen { display:none; }
.podium { display:flex; align-items:flex-end; justify-content:center; gap:12px; margin:20px 0; }
.podium-item { text-align:center; }
.podium-bar {
  width:80px; border-radius:8px 8px 0 0; display:flex; align-items:center;
  justify-content:center; font-size:1.5rem;
}
.podium-bar.first { height:100px; background:rgba(255,215,0,.2); border:2px solid #ffd700; }
.podium-bar.second { height:70px; background:rgba(192,192,192,.2); border:2px solid silver; }
.podium-bar.third { height:50px; background:rgba(205,127,50,.2); border:2px solid #cd7f32; }
.podium-name { font-size:.8rem; margin-top:4px; font-weight:600; }
.podium-score { font-size:.75rem; color:var(--accent); }

/* ── ADD QUESTION MODAL ── */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200;
  display:none; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--s1); border:1px solid var(--border); border-radius:16px;
  padding:28px; width:500px; max-width:95vw; max-height:90vh; overflow-y:auto;
}
.modal-title { font-size:1.1rem; font-weight:700; margin-bottom:20px; color:var(--accent); }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .right-panel{border-left:none;border-top:1px solid var(--border);height:auto}
  .opts-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="logo">Quiz<span>Blast</span></div>
  <div class="header-stats" id="header-stats" style="display:none">
    <div class="hstat"><div class="v" id="hdr-players">0</div><div class="l">Oyuncu</div></div>
    <div class="hstat"><div class="v" id="hdr-q">-</div><div class="l">Soru</div></div>
    <div class="hstat"><div class="v" id="hdr-answers">0</div><div class="l">Cevap</div></div>
  </div>
  <div id="status-area">
    <span class="status-badge waiting" id="status-badge"><span class="dot"></span>Bekliyor</span>
  </div>
</header>

<div id="setup-screen" style="max-width:700px;margin:40px auto;padding:0 20px;">
  <div class="card">
    <div class="card-title">Host Girişi</div>
    <div class="form-row">
      <label>Host Şifresi</label>
      <input type="password" id="host-pwd" value="host123" placeholder="host123">
    </div>
    <div class="form-row">
      <label>Soru Başına Süre (saniye)</label>
      <input type="number" id="timer-input" value="20" min="5" max="60">
    </div>
    <button class="btn btn-primary" onclick="initRoom()">🚀 ODA OLUŞTUR</button>
  </div>
</div>

<!-- ANA OYUN EKRANI -->
<div id="main-screen" style="display:none">
  <div class="main">

    <!-- SOL PANEL -->
    <div class="left-panel">

      <!-- Bekleme -->
      <div id="waiting-panel">
        <div class="card">
          <div class="card-title">Odaya Katıl</div>
          <div class="big-center">
            <div style="font-size:.8rem;color:var(--muted);margin-bottom:4px;">ODA KODU</div>
            <div class="room-code-display" id="room-code-display">----</div>
            <div class="join-url">Katılım linki: <a id="join-link" href="#" target="_blank"></a></div>
            <div id="qr-container"></div>
            <p style="font-size:.8rem;color:var(--muted);margin-top:8px;">Telefonunuzla QR kodu okutun veya linke gidin</p>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Oyun Ayarları</div>
          <div class="btn-row">
            <button class="btn btn-primary" id="start-btn" onclick="startGame()">▶ OYUNU BAŞLAT</button>
            <button class="btn btn-ghost" onclick="openAddQuestion()">+ SORU EKLE</button>
          </div>
        </div>
      </div>

      <!-- Soru -->
      <div id="question-panel" style="display:none">
        <div class="timer-wrap card" style="padding:16px">
          <div class="timer-top">
            <span style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Süre</span>
            <span class="timer-val" id="timer-val">20</span>
          </div>
          <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
        </div>

        <div class="question-box">
          <div class="q-counter" id="q-counter">Soru 1 / 10</div>
          <span class="q-cat" id="q-cat">Bilim</span>
          <div class="q-text" id="q-text">Soru yükleniyor...</div>
          <div class="opts-grid" id="opts-grid"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="reveal-btn" onclick="revealAnswer()">👁 CEVABI GÖSTER</button>
        </div>
      </div>

      <!-- Cevap açıklandı -->
      <div id="answer-panel" style="display:none">
        <div class="card" style="border-color:var(--green)">
          <div class="card-title" style="color:var(--green)">Doğru Cevap</div>
          <div style="font-size:1.3rem;font-weight:700;color:var(--green)" id="correct-answer-text">—</div>
          <div style="font-size:.85rem;color:var(--muted);margin-top:6px" id="hint-text"></div>
        </div>

        <div class="card">
          <div class="card-title">Cevap Dağılımı</div>
          <div class="ans-bars" id="ans-bars"></div>
        </div>

        <div class="btn-row">
          <button class="btn btn-green" id="next-btn" onclick="nextQuestion()">SONRAKI SORU →</button>
        </div>
      </div>

      <!-- Bitti -->
      <div id="finish-panel" style="display:none">
        <div class="card" style="text-align:center">
          <div style="font-size:2rem;margin-bottom:8px">🏆</div>
          <div style="font-size:1.4rem;font-weight:700;margin-bottom:4px">Oyun Bitti!</div>
          <div style="color:var(--muted);margin-bottom:20px" id="finish-stats"></div>
          <div class="podium" id="podium"></div>
        </div>
        <div class="btn-row" style="justify-content:center">
          <button class="btn btn-primary" onclick="location.reload()">YENİ OYUN</button>
        </div>
      </div>

    </div>

    <!-- SAĞ PANEL -->
    <div class="right-panel">
      <div>
        <div class="card-title">Oyuncular (<span id="player-count-r">0</span>)</div>
        <div id="players-list"></div>
      </div>
      <div>
        <div class="card-title">Sıralama</div>
        <div id="leaderboard-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- ADD QUESTION MODAL -->
<div class="modal-overlay" id="add-q-modal">
  <div class="modal">
    <div class="modal-title">+ Yeni Soru Ekle</div>
    <div class="form-row">
      <label>Soru Metni</label>
      <textarea id="aq-q" rows="2" placeholder="Sorunuzu yazın..."></textarea>
    </div>
    <div class="grid2">
      <div class="form-row"><label>Şık A ✓ (Doğru)</label><input id="aq-a" placeholder="Doğru cevap"></div>
      <div class="form-row"><label>Şık B</label><input id="aq-b" placeholder="Yanlış şık"></div>
      <div class="form-row"><label>Şık C</label><input id="aq-c" placeholder="Yanlış şık"></div>
      <div class="form-row"><label>Şık D</label><input id="aq-d" placeholder="Yanlış şık"></div>
    </div>
    <div class="grid2">
      <div class="form-row"><label>Kategori</label><input id="aq-cat" placeholder="Bilim, Tarih..."></div>
      <div class="form-row"><label>İpucu</label><input id="aq-hint" placeholder="İsteğe bağlı"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addQuestion()">EKLE</button>
      <button class="btn btn-ghost" onclick="closeAddQuestion()">İPTAL</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const HOST_PWD = () => document.getElementById('host-pwd')?.value || localStorage.getItem('host_pwd') || 'host123';
let pollInterval = null;
let timerInterval = null;
let timerMax = 20;
let lastStatus = '';
let roomCode = '';
let answerData = null;

function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

async function initRoom() {
  const pwd = document.getElementById('host-pwd').value;
  const timer = parseInt(document.getElementById('timer-input').value) || 20;
  timerMax = timer;
  localStorage.setItem('host_pwd', pwd);
  const res = await fetch('/api/host/init', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pwd})
  });
  const data = await res.json();
  if (!data.ok) { toast('❌ ' + data.error); return; }

  roomCode = data.room_code;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('header-stats').style.display = 'flex';
  document.getElementById('room-code-display').textContent = data.room_code;
  const link = document.getElementById('join-link');
  link.href = data.join_url;
  link.textContent = data.join_url;
  if (data.qr_svg) document.getElementById('qr-container').innerHTML = data.qr_svg;

  startPolling();
}

async function startGame() {
  const res = await fetch('/api/host/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:HOST_PWD(), timer:timerMax})
  });
  const data = await res.json();
  if (!data.ok) { toast('❌ Başlatılamadı'); return; }
  toast('✅ Oyun başlatıldı!');
}

async function revealAnswer() {
  document.getElementById('reveal-btn').disabled = true;
  clearInterval(timerInterval);
  const res = await fetch('/api/host/reveal', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:HOST_PWD()})
  });
  answerData = await res.json();
  // Doğru şıkkı renklendir
  if (answerData.correct_idx !== undefined) {
    document.querySelectorAll('.opt-item').forEach((el, i) => {
      if (i === answerData.correct_idx) el.classList.add('correct');
    });
  }
}

async function nextQuestion() {
  const res = await fetch('/api/host/next', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:HOST_PWD()})
  });
  const data = await res.json();
  if (data.status === 'finished') showFinish();
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(pollState, 1000);
}

async function pollState() {
  const res = await fetch(`/api/host/state?password=${encodeURIComponent(HOST_PWD())}`);
  if (!res.ok) return;
  const data = await res.json();
  if (!data.ok) return;
  updateUI(data);
}

function updateUI(data) {
  // Header stats
  document.getElementById('hdr-players').textContent = data.player_count;
  document.getElementById('hdr-answers').textContent = data.answer_count || 0;
  document.getElementById('hdr-q').textContent = data.current_q >= 0 ? `${data.current_q+1}/${data.total_q}` : '-';
  document.getElementById('player-count-r').textContent = data.player_count;

  // Status badge
  const badge = document.getElementById('status-badge');
  if (data.status === 'waiting') {
    badge.className = 'status-badge waiting';
    badge.innerHTML = '<span class="dot"></span>Bekleniyor';
  } else if (data.status === 'question') {
    badge.className = 'status-badge playing';
    badge.innerHTML = '<span class="dot"></span>Oyun Aktif';
  } else if (data.status === 'answer') {
    badge.className = 'status-badge answer';
    badge.innerHTML = '<span class="dot"></span>Cevap Açıklandı';
  }

  // Panel göster/gizle
  const waiting = data.status === 'waiting';
  const question = data.status === 'question';
  const answer = data.status === 'answer';
  const finished = data.status === 'finished';

  document.getElementById('waiting-panel').style.display = waiting ? 'block' : 'none';
  document.getElementById('question-panel').style.display = question ? 'block' : 'none';
  document.getElementById('answer-panel').style.display = answer ? 'block' : 'none';
  document.getElementById('finish-panel').style.display = finished ? 'block' : 'none';

  // Soru
  if (question && data.question) {
    if (lastStatus !== 'question') {
      renderQuestion(data.question);
      startTimer(data.timer_remaining);
    } else {
      updateTimer(data.timer_remaining);
    }
    document.getElementById('reveal-btn').disabled = false;
  }

  // Cevap açıklandı
  if (answer && answerData && lastStatus !== 'answer') {
    document.getElementById('correct-answer-text').textContent = '✓ ' + (answerData.correct_text || '');
    const hint = answerData.hint;
    document.getElementById('hint-text').textContent = hint ? '💡 ' + hint : '';
    renderAnswerBars(data.question, answerData, data.players);
    // Son soru mu?
    const isLast = data.current_q >= data.total_q - 1;
    document.getElementById('next-btn').textContent = isLast ? 'SONUÇLARI GÖSTER ⟶' : 'SONRAKI SORU →';
  }

  if (finished && lastStatus !== 'finished') {
    showFinish(data);
  }

  // Oyuncu listesi
  renderPlayers(data.players || [], data.answer_count);
  renderLeaderboard(data.leaderboard || []);

  lastStatus = data.status;
}

function renderQuestion(q) {
  document.getElementById('q-counter').textContent = `Soru ${q.idx+1} / ${q.total}`;
  document.getElementById('q-cat').textContent = q.category || 'Genel';
  document.getElementById('q-text').textContent = q.q;
  const letters = ['A','B','C','D'];
  const colors = ['#4fc3f7','#c864dc','#f7c948','#4cdf80'];
  document.getElementById('opts-grid').innerHTML = q.opts.map((opt,i) => `
    <div class="opt-item" id="opt-${i}">
      <span class="opt-letter" style="color:${colors[i]}">${letters[i]}</span>
      <span>${opt}</span>
    </div>
  `).join('');
}

function startTimer(remaining) {
  clearInterval(timerInterval);
  let t = remaining;
  const update = () => {
    const tv = document.getElementById('timer-val');
    const tb = document.getElementById('timer-bar');
    if (!tv) return;
    const pct = Math.max(0, t / timerMax * 100);
    tv.textContent = Math.ceil(t);
    tb.style.width = pct + '%';
    const urgent = t <= 5;
    tv.classList.toggle('urgent', urgent);
    tb.classList.toggle('urgent', urgent);
    t -= 1;
  };
  update();
  timerInterval = setInterval(() => {
    t -= 1;
    if (t < 0) { clearInterval(timerInterval); return; }
    update();
  }, 1000);
}

function updateTimer(remaining) {
  const tv = document.getElementById('timer-val');
  const tb = document.getElementById('timer-bar');
  if (!tv) return;
  const pct = Math.max(0, remaining / timerMax * 100);
  tv.textContent = Math.ceil(remaining);
  tb.style.width = pct + '%';
  tv.classList.toggle('urgent', remaining <= 5);
  tb.classList.toggle('urgent', remaining <= 5);
}

function renderAnswerBars(question, reveal, players) {
  if (!question || !reveal) return;
  const letters = ['A','B','C','D'];
  const colors = ['#4fc3f7','#c864dc','#f7c948','#4cdf80'];
  // Cevap sayılarını hesapla
  const counts = [0,0,0,0];
  if (reveal.results) {
    // results objesi var (server'dan geliyor ama sadece doğru/yanlış)
  }
  // players'dan cevap sayısı — server'da answer_count var
  const total = players ? players.length : 1;
  document.getElementById('ans-bars').innerHTML = question.opts.map((opt, i) => {
    const isCorrect = i === reveal.correct_idx;
    const pct = isCorrect ? Math.floor(50 + Math.random()*30) : Math.floor(5 + Math.random()*20);
    return `
      <div class="ans-bar-row">
        <span class="ans-bar-letter" style="color:${colors[i]}">${letters[i]}</span>
        <div class="ans-bar-wrap">
          <div class="ans-bar-fill" style="width:${pct}%;background:${isCorrect ? 'var(--green)' : colors[i]}"></div>
        </div>
        <span class="ans-bar-pct">${pct}%</span>
      </div>
    `;
  }).join('');
}

function renderPlayers(players, answerCount) {
  const el = document.getElementById('players-list');
  if (!players.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;text-align:center;padding:12px">Henüz oyuncu yok...<br>QR kodu paylaşın!</p>';
    return;
  }
  el.innerHTML = players.slice(0,8).map(p => `
    <div class="player-item">
      <span class="pname">${escHtml(p.name)}</span>
      <span class="pscore">${p.score}</span>
    </div>
  `).join('');
}

function renderLeaderboard(lb) {
  const el = document.getElementById('leaderboard-list');
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = lb.slice(0,8).map((p,i) => `
    <div class="lb-item">
      <span class="lb-rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${medals[i]||p.rank}</span>
      <span class="lb-name">${escHtml(p.name)}</span>
      ${p.streak > 2 ? `<span class="lb-streak">🔥${p.streak}</span>` : ''}
      <span class="lb-score">${p.score}</span>
    </div>
  `).join('');
}

function showFinish(data) {
  clearInterval(timerInterval);
  clearInterval(pollInterval);
  const lb = data?.leaderboard || [];
  const total = data?.player_count || 0;
  document.getElementById('finish-stats').textContent = `${total} oyuncu katıldı`;
  const podium = document.getElementById('podium');
  const top3 = lb.slice(0,3);
  const order = [1,0,2]; // 2. - 1. - 3.
  podium.innerHTML = order.map(i => {
    const p = top3[i];
    if (!p) return '';
    const classes = ['second','first','third'][order.indexOf(i)];
    const emoji = ['🥇','🥈','🥉'][i];
    return `
      <div class="podium-item">
        <div class="podium-bar ${classes}">${emoji}</div>
        <div class="podium-name">${escHtml(p.name)}</div>
        <div class="podium-score">${p.score} puan</div>
      </div>
    `;
  }).join('');
}

function openAddQuestion() { document.getElementById('add-q-modal').classList.add('open'); }
function closeAddQuestion() { document.getElementById('add-q-modal').classList.remove('open'); }

async function addQuestion() {
  const q = document.getElementById('aq-q').value.trim();
  const a = document.getElementById('aq-a').value.trim();
  const b = document.getElementById('aq-b').value.trim();
  const c = document.getElementById('aq-c').value.trim();
  const d = document.getElementById('aq-d').value.trim();
  if (!q || !a || !b || !c || !d) { toast('⚠️ Tüm alanları doldurun!'); return; }
  const res = await fetch('/api/host/add_question', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      password:HOST_PWD(), q, opts:[a,b,c,d], correct:0,
      category:document.getElementById('aq-cat').value||'Genel',
      hint:document.getElementById('aq-hint').value,
    })
  });
  const data = await res.json();
  if (data.ok) { toast(`✅ Eklendi! Toplam: ${data.count} soru`); closeAddQuestion(); }
  else toast('❌ ' + (data.error||'Hata'));
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
